  - ledger_balances
  - exposure_snapshots
  - scenario_outputs
  - supervisory_reporting_extracts

primary_modules:
  - validation_engine
  - lineage_capture
  - workflow_controls

recommended_control_sets:
  - assets/control_sets/universal_record_controls.yaml
  - assets/control_sets/capital_exposure_controls.yaml
  - assets/control_sets/scenario_projection_controls.yaml
